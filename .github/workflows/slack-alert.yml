name: Slack Alert
on:
  issues:
    types: [opened]

jobs:
  slack_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize Body for Slack
        id: sanitize
        # This little script removes newlines and quotes that break JSON
        run: |
          BODY=$(echo "${{ github.event.issue.body }}" | jq -aRs .)
          echo "CLEAN_BODY=$BODY" >> $GITHUB_OUTPUT

      - name: Send Slack Message
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 New KB Alert: ${{ github.event.issue.title }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "💡 *New KB submitted!*\n\n*Title:* ${{ github.event.issue.title }}\n*Author:* `${{ github.event.issue.user.login }}`"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Description:*\n${{ steps.sanitize.outputs.CLEAN_BODY }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "🔗 <${{ github.event.issue.html_url }}|View on GitHub>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
