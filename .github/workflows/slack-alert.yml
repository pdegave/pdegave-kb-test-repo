name: Slack Issue Alert

on:
  issues:
    types: [opened]

jobs:
  slack-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        # Updated to v2.0.0 to fix the Node.js warning
        uses: slackapi/slack-github-action@v2.0.0
        with:
          # The "method" tells the action we are using a Webhook
          method: post
          spec:
            # This "text" is the fallback that Slack was complaining about (Error 400)
            text: "New KB Idea: ${{ github.event.issue.title }}"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🚀 New KB Idea Submitted!"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Subject:*\n${{ github.event.issue.title }}"
                  - type: "mrkdwn"
                    text: "*Submitted By:*\n${{ github.event.issue.user.login }}"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Description:*\n${{ github.event.issue.body }}"
              - type: "divider"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "🔗 <${{ github.event.issue.html_url }}|View Issue on GitHub>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
