name: Slack Alert
on:
  issues:
    types: [opened]

jobs:
  slack_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Message
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "💡 New KB: ${{ github.event.issue.title }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "💡 *New KB idea submitted!*\n📝 *Title:* ${{ github.event.issue.title }}\n👤 *Author:* ${{ github.event.issue.user.login }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "👤 Assign Me"
                      },
                      "url": "${{ github.event.issue.html_url }}/assignees"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "✅ Close Issue"
                      },
                      "style": "danger",
                      "url": "${{ github.event.issue.html_url }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "📂 View on GitHub"
                      },
                      "url": "${{ github.event.issue.html_url }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
